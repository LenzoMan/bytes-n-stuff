<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#2e2e33" rx="10"/>
  
  <!-- Bytes & Stuff theme: stylized 'B' and digital elements -->
  <g fill="#e8e8e8">
    <!-- Large 'B' shape representing Bytes -->
    <rect x="20" y="20" width="15" height="60" rx="2"/>
    <rect x="20" y="20" width="25" height="12" rx="2"/>
    <rect x="20" y="50" width="28" height="12" rx="2"/>
    <rect x="20" y="68" width="25" height="12" rx="2"/>
    
    <!-- Digital dots representing 'Stuff' -->
    <circle cx="65" cy="30" r="4"/>
    <circle cx="75" cy="30" r="4"/>
    <circle cx="65" cy="45" r="4"/>
    <circle cx="75" cy="45" r="4"/>
    <circle cx="65" cy="60" r="4"/>
    <circle cx="75" cy="60" r="4"/>
    <circle cx="65" cy="75" r="4"/>
    <circle cx="75" cy="75" r="4"/>
  </g>
</svg>
